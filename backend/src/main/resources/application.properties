spring.application.name=backend
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

app.jwtSecret=${JWT_SECRET}
app.jwtExpirationMs=86400000

# Reverse proxy (Caddy) mögött a helyes https séma felismeréséhez
server.forward-headers-strategy=framework

# Engedélyezett CORS origin-ek (vesszővel elválasztva). Élesben a domaint
# az APP_CORS_ALLOWED_ORIGINS env-változó adja (lásd docker-compose.prod.yml),
# alapértelmezésben a helyi fejlesztői címek.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}
