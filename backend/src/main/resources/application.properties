spring.application.name=backend
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

app.jwtSecret=${JWT_SECRET}
app.jwtExpirationMs=86400000

# Reverse proxy (Caddy) mögött a helyes https séma felismeréséhez
server.forward-headers-strategy=framework

# Engedélyezett CORS origin-ek (vesszővel elválasztva). Élesben a domaint
# az APP_CORS_ALLOWED_ORIGINS env-változó adja (lásd docker-compose.prod.yml),
# alapértelmezésben a helyi fejlesztői címek.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}

# --- Visszajelzés (hibajelentés / javaslat) e-mailben ---
# A játékosok visszajelzése SMTP-n keresztül erre a címre érkezik (semmi DB-be
# nem kerül). Gmailhez app-jelszó kell (2FA bekapcsolva → App passwords).
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Ide érkeznek a visszajelzések (alapból a feladó címe).
app.feedback.to=${FEEDBACK_TO:${MAIL_USERNAME:}}
